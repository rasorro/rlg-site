<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Project_Vagabond</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #ff9f00;
      }
      #unity-canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
        /* Customize what is visible while Unity is not actively rendering. */
        background-color: #ff9f00;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="0"></canvas>
    <script src="Build/Unity Builds.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var resizeFocusTimer = null;

      function focusGameCanvas() {
        try {
          window.focus();
          canvas.focus({ preventScroll: true });
        } catch (e) {
          canvas.focus();
        }
      }

      window.addEventListener("message", function (event) {
        if (event.origin !== window.location.origin) {
          return;
        }

        if (event.data && event.data.type === "RLG_FOCUS_GAME") {
          focusGameCanvas();
        }
      });

      window.addEventListener("load", function () {
        setTimeout(focusGameCanvas, 50);
      });

      // Some browsers briefly drop focus during resize/orientation changes.
      window.addEventListener("resize", function () {
        if (resizeFocusTimer) {
          clearTimeout(resizeFocusTimer);
        }
        resizeFocusTimer = setTimeout(focusGameCanvas, 120);
      });

      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
          setTimeout(focusGameCanvas, 50);
        }
      });

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Unity Builds.data",
        frameworkUrl: "Build/Unity Builds.framework.js",
        codeUrl: "Build/Unity Builds.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Reaction Lab LLC",
        productName: "Project_Vagabond",
        productVersion: "0.1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
        focusGameCanvas();
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
